events {}

http {
    include      /etc/nginx/mime.types;
    default_type application/octet-buffer;

    server {
        listen 80;
        server_name _;
        root /usr/share/nginx/html;
        index index.html;

        location / {
            try_files $uri $uri/ =404;
        }

        real_ip_header X-Forwarded-For;
        set_real_ip_from 127.0.0.1;   # Caddy is on the same host
    }
}