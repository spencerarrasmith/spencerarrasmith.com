<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Spencer Arrasmith</title>
  <style>
    *, *::before, *::after { margin: 0; padding: 0; box-sizing: border-box; }

    body {
      overflow: hidden;
      width: 100vw;
      height: 100vh;
      background: #0d0b05;
    }

    canvas {
      display: block;
      position: fixed;
      top: 0; left: 0;
      width: 100vw;
      height: 100vh;
    }

    #hint {
      position: fixed;
      bottom: 2.5rem;
      left: 50%;
      transform: translateX(-50%);
      color: rgba(70, 50, 15, 0.5);
      font: italic 13px Georgia, serif;
      letter-spacing: 0.12em;
      white-space: nowrap;
      pointer-events: none;
      transition: opacity 2s ease;
      z-index: 10;
    }

    /* Portfolio nav — hidden until tree is mostly grown */
    #nav {
      position: fixed;
      bottom: 2.5rem;
      right: 2.5rem;
      display: flex;
      flex-direction: column;
      gap: 0.6rem;
      align-items: flex-end;
      opacity: 0;
      transition: opacity 1.5s ease;
      z-index: 10;
    }

    #nav a {
      color: rgba(60, 42, 12, 0.7);
      font: 12px Georgia, serif;
      letter-spacing: 0.15em;
      text-transform: uppercase;
      text-decoration: none;
      transition: color 0.2s;
    }

    #nav a:hover { color: rgba(60, 42, 12, 1); }
  </style>
</head>
<body>
  <canvas id="c"></canvas>
  <p id="hint">move your mouse to grow</p>

  <nav id="nav">
    <a href="/work">Work</a>
    <a href="/about">About</a>
    <a href="/contact">Contact</a>
  </nav>

  <script src="tree.js" defer></script>

</body>
</html>
